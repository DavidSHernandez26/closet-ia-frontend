<!DOCTYPE html>
<html lang="es">
  <head>
    <style>
  html, body, #root {

</style>

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Be: Confident" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Be: Confident" />

    <meta property="og:locale" content="es_ES" />
    <meta property="og:site_name" content="Be: Confident" />

    <meta name="twitter:image" content="https://closetia.app/social-preview.png" />

    <script type="application/ld+json">

      "@context": "https://schema.org",

      "name": "Be: Confident",

    }

    <!-- ── Preconnect para APIs externas ── -->
    <link rel="preconnect" href="https://api.open-meteo.com" />

    <link rel="dns-prefetch" href="https://api.open-meteo.com" />

  <!-- Glass filter -->
<svg style="position:absolute;width:0;height:0;overflow:hidden">
  <defs>
    <filter id="frosted" primitiveUnits="objectBoundingBox">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.02" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>
</svg>
